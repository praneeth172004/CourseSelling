<!DOCTYPE html>
<html>
<head>
    <title>Create Course</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, textarea {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #218838;
        }

        #message {
            margin-top: 10px;
            text-align: center;
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create a New Course</h1>
        <form id="createCourseForm">
            <input type="text" id="title" placeholder="Title" required>
            <textarea id="description" placeholder="Description" required></textarea>
            <input type="number" id="price" placeholder="Price" required>
            <label>
                <input type="checkbox" id="published"> Published
            </label>
            <button type="submit">Create Course</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('createCourseForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const price = document.getElementById('price').value;
            const published = document.getElementById('published').checked;

            try {
                const response = await fetch('http://localhost:3001/admin/course', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // Include cookies with the request
                    body: JSON.stringify({ title, description, price,  published })
                });

                const result = await response.json();
                console.log(result.msg);
                
                document.getElementById('message').innerText = result.msg;

                if (result.msg === 'You Successfully Created a Course') {
                    setTimeout(() => {
                        window.location.href = '/admincourse.html'; 
                    }, 2000);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('message').innerText = 'Something went wrong. Please try again.';
            }
        });
    </script>
</body>
</html>
