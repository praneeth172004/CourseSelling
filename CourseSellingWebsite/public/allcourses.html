<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Courses</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      color: #007bff;
      margin-bottom: 20px;
    }

    #coursesContainer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      width: 80%;
      margin-bottom: 20px;
    }

    .course-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .course-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
    }

    .course-card h2 {
      font-size: 1.2rem;
      color: #333;
    }

    .course-card button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
      margin-top: 10px;
    }

    .course-card button:hover {
      background-color: #0056b3;
      transform: scale(1.05);
    }

    #message {
      margin-top: 20px;
      color: red;
      text-align: center;
    }

    .navigate-btn {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
      margin-bottom: 20px;
    }

    .navigate-btn:hover {
      background-color: #218838;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Available Courses</h1>
  <button class="navigate-btn" onclick="window.location.href = 'purchasedcourses.html'">View Purchased Courses</button>
  <div id="coursesContainer"></div>
  <div id="message"></div>

  <script>
    async function fetchCourses() {
      try {
        const response = await fetch("http://localhost:3001/user/allcourses", {
          method: "GET",
          credentials: "include",
        });

        const data = await response.json();

        if (response.ok) {
          const container = document.getElementById("coursesContainer");
          container.innerHTML = data.courses
            .map(course => `
              <div class="course-card">
                <h2>${course.title}</h2>
                <p>${course.description}</p>
                <button onclick="purchaseCourse('${course._id}')">Purchase</button>
              </div>
            `)
            .join("");
        } else {
          document.getElementById("message").innerText = data.msg || "Failed to fetch courses.";
        }
      } catch (error) {
        console.error("Error fetching courses:", error);
        document.getElementById("message").innerText = "An error occurred while fetching courses.";
      }
    }

    async function purchaseCourse(courseId) {
      try {
        const response = await fetch(`http://localhost:3001/user/courses/${courseId}`, {
          method: "POST",
          credentials: "include",
        });

        const data = await response.json();

        if (response.ok) {
          document.getElementById("message").innerText = "Course purchased successfully!";
          fetchCourses();  // Refresh courses list after purchase
        } else {
          document.getElementById("message").innerText = data.msg || "Failed to purchase course.";
        }
      } catch (error) {
        console.error("Error purchasing course:", error);
        document.getElementById("message").innerText = "An error occurred while purchasing the course.";
      }
    }

    fetchCourses();
  </script>
</body>
</html>
