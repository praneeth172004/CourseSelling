<!DOCTYPE html>
<html>
<head>
    <title>All Courses</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .course-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .course-card {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            position: relative;
        }

        .course-card:hover {
            transform: scale(1.05);
        }

        .course-card h2 {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #007bff;
        }

        .course-card p {
            font-size: 0.9rem;
            color: #555;
        }

        .course-card .price {
            color: green;
            font-weight: bold;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        #message {
            text-align: center;
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Your Courses</h1>
        <button class="button" onclick="window.location.href='/course.html'">Add Course</button>
        <div id="message"></div>
        <div class="course-list" id="courseList"></div>
    </div>

    <script>
        async function fetchCourses() {
            try {
                const response = await fetch('http://localhost:3001/admin/courses', {
                    method: 'GET',
                    credentials: 'include',
                });

                const result = await response.json();
                if (result.data) {
                    const courseList = document.getElementById('courseList');
                    courseList.innerHTML = '';
                    result.data.forEach(course => {
                        const courseElement = document.createElement('div');
                        courseElement.classList.add('course-card');
                        courseElement.innerHTML = `
                            <div id="view-${course._id}">
                                <h2>${course.title}</h2>
                                <p>${course.description}</p>
                                <div class="price">Price: $${course.price}</div>
                                <button onclick="editCourse('${course._id}', '${course.title}', '${course.description}', '${course.price}')">Edit</button>
                            </div>
                            <div id="edit-${course._id}" style="display: none;">
                                <input type="text" id="title-${course._id}" value="${course.title}">
                                <textarea id="description-${course._id}">${course.description}</textarea>
                                <input type="number" id="price-${course._id}" value="${course.price}">
                                <button onclick="saveCourse('${course._id}')">Save</button>
                                <button onclick="cancelEdit('${course._id}')">Cancel</button>
                            </div>
                        `;
                        courseList.appendChild(courseElement);
                    });
                } else {
                    document.getElementById('message').innerText = result.msg || 'No courses found';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('message').innerText = 'Something went wrong. Please try again.';
            }
        }

        function editCourse(courseId, title, description, price) {
            document.getElementById(`view-${courseId}`).style.display = 'none';
            document.getElementById(`edit-${courseId}`).style.display = 'block';
        }

        function cancelEdit(courseId) {
            document.getElementById(`edit-${courseId}`).style.display = 'none';
            document.getElementById(`view-${courseId}`).style.display = 'block';
        }

        async function saveCourse(courseId) {
            const title = document.getElementById(`title-${courseId}`).value;
            const description = document.getElementById(`description-${courseId}`).value;
            const price = document.getElementById(`price-${courseId}`).value;

            if (!title || !description || !price) {
                alert("All fields are required.");
                return;
            }

            try {
                const response = await fetch(`http://localhost:3001/admin/courses/${courseId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ title, description, price })
                });

                const result = await response.json();
                alert(result.msg || 'Course updated successfully.');
                fetchCourses();
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to update the course. Please try again.');
            }
        }

        fetchCourses();
    </script>
</body>
</html>
