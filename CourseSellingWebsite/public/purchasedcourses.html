<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchased Courses</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      color: #007bff;
      margin-bottom: 20px;
    }

    #purchasedCoursesContainer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      width: 80%;
    }

    .course-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .course-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
    }

    .course-card h2 {
      font-size: 1.2rem;
      color: #333;
      margin-bottom: 10px;
    }

    .course-card p {
      color: #666;
    }

    .back-btn {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
      margin-top: 20px;
    }

    .back-btn:hover {
      background-color: #218838;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Purchased Courses</h1>
  <div id="purchasedCoursesContainer"></div>
  <button class="back-btn" onclick="window.location.href = 'allcourses.html'">Back to All Courses</button>

  <script>
    async function fetchPurchasedCourses() {
      try {
        const response = await fetch("http://localhost:3001/user/purchasedCourses", {
          method: "GET",
          credentials: "include",
        });

        const data = await response.json();
        const container = document.getElementById("purchasedCoursesContainer");

        if (data.data && data.data.length > 0 && data.data[0].purchasedcourses.length > 0) {
          const purchasedCourses = data.data[0].purchasedcourses;

          container.innerHTML = purchasedCourses
            .map(course => `
              <div class="course-card">
                <h2>${course.title}</h2>
                <p>${course.description || 'No description available.'}</p>
              </div>
            `)
            .join("");
        } else {
          container.innerHTML = `<div class="course-card">No purchased courses found.</div>`;
        }
      } catch (error) {
        console.error("Error fetching purchased courses:", error);
        alert("Failed to fetch purchased courses.");
      }
    }

    fetchPurchasedCourses();
  </script>
</body>
</html>
